<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enroll Fingerprint - Smart Hostel Admin</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- External CSS -->
  <link rel="stylesheet" href="admin.css">
  <script type="module" src="enrollfingerprint.js"></script>
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-text">
        <h3>Admin Panel</h3>
        <p>Smart Hostel</p>
      </div>
    </div>

    <ul class="menu">
      <li><a href="admindashboard.html"><i class="fas fa-th"></i>Dashboard</a></li>
      <li><a href="adminattendace.html"><i class="fas fa-fingerprint"></i>Smart Attendance</a></li>
      <li class="active">
        <a href="enrollfingerprint.html"><i class="fas fa-fingerprint"></i>Enroll Student Fingerprint</a>
      </li>
      <li><a href="adminroom.html"><i class="fas fa-bed"></i>Room Management</a></li>
      <li><a href="adminstudentmanagment.html"><i class="fas fa-user-graduate"></i>Student</a></li>
      <li><a href="adminreports.html"><i class="fas fa-chart-bar"></i>Reports</a></li>
      <li><a href="admininvite.html"><i class="fas fa-envelope"></i>Invitation</a></li>
      <li><a href="adminaccount.html"><i class="fas fa-user"></i>Account</a></li>
    </ul>

    <div class="logout">
      <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i>Logout</a>
    </div>
  </aside>

  <!-- Main Content -->
  <main class="content">

    <div class="main-header">
      <h1>Enroll Fingerprint</h1>
      <p>Register student biometric fingerprint for attendance.</p>
    </div>

    <div class="section-box">

      <div class="info-grid" style="margin-bottom: 20px;">
        <div class="info-item">
          <label>Student ID</label>
          <input type="text" id="studentId" placeholder="Enter Student ID">
        </div>
        <div class="info-item">
          <label>Student Name</label>
          <input type="text" id="studentName"  placeholder="Enter Student Name">
        </div>
      </div>

      <div class="scanner">
        <i class="fas fa-fingerprint" style="font-size: 48px; color: #1abc9c; display: block; margin-bottom: 10px;"></i>
        Place finger on scanner
      </div>

      <div style="margin-top: 20px;">
        <button class="btn-light-blue" id="enrollBtn" style="padding: 10px 22px; font-size: 14px; cursor: pointer; border: none; font-family: 'Poppins', sans-serif;">
          <i class="fas fa-fingerprint"></i> Enroll Fingerprint
        </button>
      </div>

    </div>

  </main>
</div>
<script src="logout.js"></script>
</body>
</html>
