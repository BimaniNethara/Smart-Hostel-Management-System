<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile - Smart Hostel</title>
    <link rel="stylesheet" href="MyStudentProfile.css">
</head>
<body>
     <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
    <div class="avatar">
        <img id="profileImage" 
             src="default-avatar.png" 
             alt="Profile Picture"
             style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
    </div>
    <div class="sidebar-title">
        <h2>Student Panel</h2>
        <p>Smart Hostel</p>
    </div>
</div>
    
    

        <nav class="sidebar-nav">
            <a href="MyDashboard.html" class="nav-item" id="nav-dashboard">
                <span class="nav-icon">☰</span>
                <span>Dashboard</span>
            </a>
            <a href="MyAttendence1.html" class="nav-item" id="nav-attendance">
                <span class="nav-icon">📋</span>
                <span>Attendance</span>
            </a>
            <a href="RoomInfo.html" class="nav-item" id="nav-room">
                <span class="nav-icon">ℹ️</span>
                <span>Room Information</span>
            </a>
            <a href="MyStudentProfile.html" class="nav-item active" id="nav-setting">
                <span class="nav-icon">⚙️</span>
                <span>Student Profile</span>
            </a>
        </nav>

        <a href="#" class="logout" id="logout-btn">
            <span class="nav-icon">↪</span>
            <span>Logout</span>
        </a>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header">
            <h1>Student Profile</h1>
            <p>Welcome, <span id="header-student-name">Student</span></p>
        </header>

        <div class="content-wrapper">
            <!-- Personal Information Form — ALL FIELDS READONLY -->
            <div class="form-section">
                <h2>Personal Information</h2>

                <form id="profile-form" class="profile-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First Name</label>
                            <input type="text" id="first-name" readonly>
                        </div>
                        <div class="form-group">
                            <label>Last Name</label>
                            <input type="text" id="last-name" readonly>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Date of Birth</label>
                            <input type="date" id="date-of-birth" readonly>
                        </div>
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" id="email" readonly>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Address</label>
                            <input type="text" id="address" readonly>
                        </div>
                        <div class="form-group">
                            <label>Gender</label>
                            <input type="text" id="gender" readonly>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Phone Number</label>
                            <input type="tel" id="phone-number" readonly>
                        </div>
                        <div class="form-group">
                            <label>Emergency Number</label>
                            <input type="tel" id="emergency-number" readonly>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Student ID</label>
                            <input type="text" id="student-id" readonly>
                        </div>
                        <div class="form-group">
                            <label>Academic Year</label>
                            <input type="text" id="year" readonly>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Department</label>
                            <input type="text" id="department" readonly>
                        </div>
                        <div class="form-group">
                            <label>Faculty</label>
                            <input type="text" id="faculty" readonly>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Registration Date</label>
                            <input type="text" id="reg-date" readonly>
                        </div>
                        <div class="form-group">
                            <label>Expiry Date</label>
                            <input type="text" id="expired-date" readonly>
                        </div>
                    </div>
                </form>
            </div>

            <!-- Profile Picture Section — ONLY THIS IS EDITABLE -->
            <div class="profile-section">
                <h2>Profile Picture</h2>

                <div class="profile-picture-container">
                    <div class="profile-picture" id="profile-picture">
                        <img id="profile-image" src="" alt="Profile Picture" style="display:none;">
                        <div class="profile-placeholder" id="profile-placeholder">
                            <span id="profile-initials">SP</span>
                        </div>
                    </div>

                    <!-- Only editable action -->
                    <label for="profile-upload" class="upload-button">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                            <polyline points="17 8 12 3 7 8"/>
                            <line x1="12" y1="3" x2="12" y2="15"/>
                        </svg>
                        Change Photo
                    </label>
                    <input type="file" id="profile-upload" accept="image/*" style="display:none;">
                </div>

                <p class="readonly-note">ℹ️ Contact administrator to update other details.</p>
            </div>
        </div>
    </main>

    <script type="module" src="MyStudentProfile.js"></script>
</body>
</html>
